name: Build & Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile
        run: mvn -B clean compile

      - name: Run unit tests
        run: mvn -B test

      - name: Run integration tests (*IT)
        run: mvn -B failsafe:integration-test failsafe:verify
