    # Comparativa entre la API de la AEAT y la API de Verifacti


    La API que la Agencia Estatal de Administración Tributaria (AEAT) ha puesto
    a disposición de los contribuyentes para enviar las facturas

    requiere seguir los siguientes pasos:


    &nbsp;


    <ol style="list-style: decimal;">
      <li>Crear una huella digital usando los datos de la factura y el NIF del contribuyente.</li>
      <li>Componer un fichero XML con los datos de la factura, la huella y la huella del envío anterior.</li>
      <li>Enviar dicho fichero XML a la AEAT mediante una llamada autenticada usando un certificado electrónico cualificado reconocido.</li>
      <li>Gestionar los envíos de acuerdo al protocolo establecido por la AEAT. Es decir, no más de una llamada al minuto, salvo que se acumulen más de 1000 envíos.</li>
      <li>En paralelo, se ha de generar un código QR que contiene la url de verificación de la factura para incluir en la factura que se entrega al destinatario.</li>
      <li>Guardar los datos de cada factura.</li>
    </ol>


    &nbsp;


    Usando nuestra API de Verifactu, todos estos pasos se simplifican en un solo
    paso:


    &nbsp;


    <ol style="list-style: decimal;">
      <li>Hacer una llamada (sin certificado) con los datos de la factura en formato JSON.</li>
    </ol>


    &nbsp;


    Nuestra API te responde de inmediato con el código QR para que lo añadas
    directamente en la factura. Nosotros nos encargamos de

    la huella, los ficheros XML, el código QR, la llamada autenticada, las colas
    y los tiempos de espera, y el almacenaje de las facturas.


    &nbsp;


    En cualquier momento puedes comprobar el estado de todos tus envíos y
    facturas via API. Además, dispondrás de un sencillo dashboard

    para hacerlo de forma más cómoda. Esto puede resultar especialmente útil en
    el momento de hacer las primeras pruebas e integración. Ahí

    también encontrarás ejemplos de las distintas llamadas e incluso una
    terminal para que puedas hacer pruebas sin necesidad de usar

    POSTMAN, por ejemplo.



    # Funcionamiento básico


    La AEAT dispone de un entorno de pruebas, y desde julio de 2025 está
    disponible el entorno de producción.

    La API de Verifacti dispone, de la misma forma, de un entorno de pruebas y
    de un entorno de producción.

    Por lo tanto, en ambos casos, la API de Verifacti se comunica con la AEAT en
    el entorno que corresponda para realizar los envíos.


    &nbsp;


    Al registrar un NIF en nuestro dashboard, se generará una API key (de test o
    de producción), que deberás incluir en el header `Authorization` para

    cualquier llamada. De esa forma, el NIF del emisor de la factura y el
    entorno vienen determinados por la API key que se esté usando.


    &nbsp;    


    Para crear una factura, se hace una llamada al endpoint POST `/create` con
    los datos de la factura en el cuerpo de la llamada, en formato JSON.

    La respuesta a dicha llamada consiste en el código QR, la huella y un
    identificador único para poder consultar el estado del registro de la
    factura.


    &nbsp;


    Debido a que la AEAT no permite enviar facturas en tiempo real, el registro
    de facturación se encola y se procesa en un tiempo de aproximadamente un
    minuto.

    El procesado de la factura consiste en enviar el XML generado a la AEAT y,
    si no hay errores, se actualiza el estado de la factura en nuestro sistema.

    En cualquier momento, se puede consultar tanto el estado del registro de
    facturación como el estado de la factura en nuestro sistema.


    Los registros de modificación y anulación de facturas siguen el mismo
    funcionamiento de encolamiento.


    &nbsp;


    Al crear tu cuenta gratuita, se te proporcionará un NIF de prueba y ejemplos
    para poder realizar las diferentes llamadas a la API.


    # Idempotencia


    Los endpoints de mutación (`/create`, `/create_bulk`, `/modify` y `/cancel`)
    aceptan una cabecera

    opcional `Idempotency-Key` para hacer reintentos seguros tras fallos de red.
    La clave es una cadena

    ASCII imprimible de 1 a 255 caracteres y se recuerda 24 horas por NIF. Los
    detalles completos y códigos de error (`400`, `409`, `422`) se documentan en

    cada endpoint afectado.
paths:
  /verifactu/health:
    get:
      summary: Estado API
      description: >
        Este endpoint devuelve el estado de la API key. Sirve principalmente
        para comprobar que la API está activa y para saber a qué NIF y entorno
        hace referencia.
      x-codeSamples:
        - lang: cURL
          label: cURL
          source: |-
            curl -X GET 'https://api.verifacti.com/verifactu/health' \
              -H 'Authorization: Bearer <API_KEY>'
      responses:
        '200':
          description: Estado de la API
          content:
            application/json:
              schema:
                type: object
                properties:
                  estado:
                    description: Estado de la API.
                    type: string
                    example: OK
                  nif:
                    description: NIF del contribuyente.
                    type: string
                    example: B75777847
                  entorno:
                    description: Entorno de la API key.
                    type: string
                    example: test
  /verifactu/status:
    post:
      summary: Estado factura
      description: >
        Este endpoint permite consultar el estado de una factura en el sistema
        de la AEAT.


        &nbsp;


        Las facturas no registradas en la AEAT no aparecerán aquí.

        Para comprobar el estado de registros de facturación no procesados aún o
        rechazados por la AEAT, se debe consultar el endpoint GET `/status`.
      x-codeSamples:
        - lang: cURL
          label: cURL
          source: |-
            curl -X POST 'https://api.verifacti.com/verifactu/status' \
              -H 'Authorization: Bearer <API_KEY>' \
              -H 'Content-Type: application/json' \
              -d '{
                   "serie": "A",
                   "numero": "234634",
                   "fecha_expedicion": "25-05-2026"
                 }'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - serie
                - numero
                - fecha_expedicion
              properties:
                serie:
                  type: string
                  example: A
                  description: Serie de la factura.
                numero:
                  type: string
                  example: '234634'
                  description: Número de la factura.
                fecha_expedicion:
                  type: string
                  pattern: \d{2,2}-\d{2,2}-\d{4,4}
                  example: 25-05-2026
                  description: >-
                    Fecha de emisión de la factura. No puede ser una fecha
                    posterior a la actual.
                fecha_operacion:
                  type: string
                  pattern: \d{2,2}-\d{2,2}-\d{4,4}
                  description: >
                    Fecha de operación de la factura. Es obligatorio incluir la
                    fecha de la operación si ésta se incluyó en el registro de 

                    facturación original y es diferente de la fecha de
                    expedición.
      responses:
        '200':
          description: Estado factura
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/estadoFactura'
        '500':
          description: Error de servidor
    get:
      summary: Estado registro
      description: >
        Este endpoint permite conocer el estado actual de un registro de
        facturación efectuado anteriormente. Inmediatamente después de enviar un
        registro, éste se

        encuentra siempre en estado `Pendiente`, se encola y se procesará
        típicamente en menos de un minuto. Esto es debido a que, en general, la
        AEAT no permite enviar registros

        de facturación en tiempo real si no que obliga a esperar un tiempo entre
        los diferentes envíos.


        &nbsp;


        Es importante entender que, aunque no es lo normal, pueden existir
        múltiples registros de facturación para una misma factura. Por ejemplo,
        una factura creada

        y anulada posteriormente tendría dos registros de facturación diferentes
        (uno para la creación y otro para la anulación). Este endpoint devuelve
        el estado del

        registro de facturación, que no corresponde necesariamente con el estado
        de la factura.


        &nbsp;


        En el entorno de test, los datos relativos a los registros de
        facturación se guardarán un máximo de 90 días.

        Sin embargo, los endpoints de consulta de facturas tendrán los datos
        históricos ya que consultan a la AEAT.
      x-codeSamples:
        - lang: cURL
          label: cURL
          source: >-
            curl -X GET
            'https://api.verifacti.com/verifactu/status?uuid=b018ced3-b362-4494-8776-9eefff1c160c'
            \
              -H 'Authorization: Bearer <API_KEY>'
      parameters:
        - in: query
          name: uuid
          required: true
          schema:
            type: string
          example: b018ced3-b362-4494-8776-9eefff1c160c
          description: >-
            Identificador único del registro recibido como respuesta en el
            momento del envío.
      responses:
        '200':
          description: Estado registro
          content:
            application/json:
              schema:
                type: object
                properties:
                  nif:
                    description: NIF del emisor de la factura.
                    type: string
                  serie:
                    description: Serie de la factura.
                    type: string
                  numero:
                    description: Número de la factura.
                    type: string
                  fecha_expedicion:
                    description: Fecha de emisión de la factura.
                    type: string
                  operacion:
                    description: >
                      Hay tres tipos de operaciones de registro habituales:

                      <ol style="list-style: disc;">
                        <li>Alta: envío normal de una factura. Endpoint: <code>/create</code>.</li>
                        <li>Subsanacion: modificación normal de una factura. Endpoint: <code>/modify</code>.</li>
                        <li>Anulacion: anulación normal de una factura. Endpoint: <code>/cancel</code>.</li>
                      </ol>


                      Existen otras 5 operaciones especiales:

                      <ol style="list-style: disc;">
                        <li>Alta (rechazo previo): modificación tras rechazo previo. Endpoint: <code>/modify</code> con <code>rechazo_previo=X</code>.</li>
                        <li>Alta (rechazo previo de subsanacion): modificación tras rechazo de subsanación. Endpoint: <code>/modify</code> con <code>rechazo_previo=S</code>.</li>
                        <li>Anulación (rechazo previo): anulación tras rechazo previo. Endpoint: <code>/cancel</code> con <code>rechazo_previo=S</code> y <code>sin_registro_previo=N</code>.</li>
                        <li>Anulación (sin registro): anulación sin registro en la AEAT. Endpoint: <code>/cancel</code> con <code>rechazo_previo=N</code> y <code>sin_registro_previo=S</code>.</li>
                        <li>Anulación (rechazo previo sin registro): envío tras rechazo sin registro. Endpoint: <code>/cancel</code> con <code>rechazo_previo=S</code> y <code>sin_registro_previo=S</code>.</li>
                      </ol>


                      Para más información, consultar la <a
                      href='https://www.agenciatributaria.es/AEAT.desarrolladores/Desarrolladores/_menu_/Documentacion/Sistemas_Informaticos_de_Facturacion_y_Sistemas_VERI_FACTU/Sistemas_Informaticos_de_Facturacion_y_Sistemas_VERI_FACTU.html'
                      target='_blank'>documentación AEAT</a>.
                    type: string
                  estado:
                    description: |
                      Estado del registro de facturación:
                      <ol style="list-style: disc;">
                        <li>Pendiente: Registro encolado y no procesado aún.</li>
                        <li>Correcto: Registro procesado correctamente por la AEAT.</li>
                        <li>Aceptado con errores: Registro aceptado con errores por la AEAT. Se requiere enviar un registro de subsanación o emitir una rectificativa.</li>
                        <li>Incorrecto: Registro considerado incorrecto por la AEAT. Se requiere enviar un registro de subsanación con <code>rechazo_previo=S</code> o <code>rechazo_previo=X</code> o emitir una rectificativa.</li>
                        <li>Duplicado: Registro no aceptado por la AEAT por existir un registro con el mismo (serie, numero, fecha_expedicion).</li>
                        <li>Anulado: Registro de anulación procesado correctamente por la AEAT.</li>
                        <li>Factura inexistente: Registro de anulación no aceptado por la AEAT por no existir la factura.</li>
                        <li>No registrado: Registro rechazado por la AEAT.</li>
                        <li>Error servidor AEAT: Error en el servidor de la AEAT. Se intentará reenviar el registro de facturación de nuevo.</li>
                      </ol>
                    type: string
                  url:
                    description: URL de verificación del código QR.
                    type: string
                  qr:
                    description: Código QR en base 64 que contiene la url.
                    type: string
                  codigo_error:
                    description: >-
                      Código de error tal y como aparece en el sistema de la
                      AEAT.
                    type: string
                  mensaje_error:
                    description: >-
                      Descripcion del error tal y como aparece en el sistema de
                      la AEAT.
                    type: string
                  estado_registro_duplicado:
                    description: >-
                      El estado del registro en caso de que el estado del
                      registro sea `Duplicado`.
                    type: string
                example:
                  nif: A15022510
                  serie: A
                  numero: '34547'
                  fecha_expedicion: 25-05-2026
                  operacion: Alta
                  url: >-
                    https://prewww2.aeat.es/wlpl/TIKE-CONT/ValidarQR?nif=A15022510&numserie=A234634&fecha=25-05-2026&importe=242
                  qr: jBBWRw0KGgoABAANSUhEAH0CAIAAABE...
                  estado: Correcto
        '404':
          description: Registro no encontrado
        '500':
          description: Error de servidor
  /verifactu/create:
    post:
      summary: Crear factura nueva
      description: >
        Mediante este endpoint se crea un registro de facturación nuevo. Existen
        tres estados de respuesta y es importante entender qué ocurre en cada
        caso:

        <br><br>

        <ol style="list-style: disc;">
          <li>
            <strong>200</strong>: Nuestra API acepta la petición y la encola para ser procesada. En este caso, la respuesta contiene el código QR en base 64 y la URL de verificación
            que contiene el código QR. Además, se devuelve el estado del registro, que siempre será <code style="color: black;">Pendiente</code>, lo que indica que ha sido encolado
            pero aún no procesado.
            <br>
            Es importante entender que este estado únicamente indica que el registro de facturación se generará y se enviará a la AEAT, lo cual no significa que necesariamente
            la AEAT lo acepte. Nuestra API realiza numerosas validaciones para minimizar el riesgo de que esto ocurra pero puede ocurrir.
            <br>
            El estado del envío se puede consultar con el endpoint GET <code style="color: black;">/status</code> usando el <code style="color: black;">uuid</code> devuelto. También disponemos de webhooks para recibir notificaciones acerca
            de los estados de los registros de facturación. La documentación de estos webhooks se puede
            consultar <a href='https://www.verifacti.com/nifs-docs#tag/Webhooks' target='_blank'>aquí</a>.
            <br><br>
          </li>
          <li>
            <strong>400</strong>: Nuestra API rechaza la llamada por algún error en el JSON enviado. El registro de facturación no se genera y no se producirá ninguna comunicación con la AEAT.
            <br>
            Realizamos numerosas comprobaciones para minimizar el riesgo de que la AEAT rechace el envío. En la respuesta se indicará un mensaje con la descripción del error.
            Las validaciones van desde comprobaciones simples como que no falte ningún campo requerido hasta más complejas como que el NIF del destinatario esté censado en la AEAT.
            <br><br>
          </li>
          <li>
            <strong>500</strong>: Error del servidor. Este es un error genérico que no debería ocurrir. En caso de que ocurra, el registro de facturación no se genera y,
            por lo tanto, no se produce ningún envío a la AEAT. El cliente deberá reintentar la llamada más tarde.  
          </li>
        </ol>


        &nbsp;


        La documentación completa del endpoint correspondiente para la API de la
        AEAT se puede consultar

        <a
        href='https://www.agenciatributaria.es/static_files/AEAT_Desarrolladores/EEDD/IVA/VERI-FACTU/Validaciones_Errores_Veri-Factu.pdf'
        target='_blank'>aquí</a>.


        &nbsp;


        Este endpoint admite además una cabecera opcional `Idempotency-Key`. Si
        se incluye, los reintentos de la

        misma petición lógica con la misma clave

        replican la respuesta original (incluyendo la cabecera de respuesta
        `Idempotent-Replayed: true` y el

        eco de `Idempotency-Key`). Las claves se vinculan al NIF y se recuerdan
        durante 24 horas.

        Reusar la misma clave con un cuerpo diferente devuelve 422; un reintento
        concurrente mientras el

        primero sigue en curso devuelve 409.
      x-codeSamples:
        - lang: cURL
          label: Factura normal
          source: |-
            curl -X POST 'https://api.verifacti.com/verifactu/create' \
              -H 'Authorization: Bearer <API_KEY>' \
              -H 'Content-Type: application/json' \
              -d '{
                   "serie": "A",
                   "numero": "1",
                   "fecha_expedicion": "25-05-2026",
                   "tipo_factura": "F1",
                   "descripcion": "Factura normal",
                   "nif": "A15022510",
                   "nombre": "Nombre cliente",
                   "lineas": [
                     {
                       "base_imponible": "200",
                       "tipo_impositivo": "21",
                       "cuota_repercutida": "42"
                     }
                   ],
                   "importe_total": "242"
                 }'
        - lang: cURL
          label: Factura simplificada
          source: |-
            curl -X POST 'https://api.verifacti.com/verifactu/create' \
              -H 'Authorization: Bearer <API_KEY>' \
              -H 'Content-Type: application/json' \
              -d '{
                   "serie": "A",
                   "numero": "1",
                   "fecha_expedicion": "25-05-2026",
                   "tipo_factura": "F2",
                   "descripcion": "Factura simplificada",
                   "lineas": [
