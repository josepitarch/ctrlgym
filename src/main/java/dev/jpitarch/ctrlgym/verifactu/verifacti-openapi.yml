      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          description: >-
            Clave única opcional para garantizar que reintentos de la misma
            petición no creen duplicados. Cadena ASCII imprimible de 1 a 255
            caracteres. Se recuerda durante 24 horas por NIF.
          schema:
            type: string
            pattern: ^[\x20-\x7E]{1,255}$
            minLength: 1
            maxLength: 255
            example: 8e1b9c2a-3f4d-4a6b-9c2e-1d2f3e4a5b6c
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - serie
                - numero
                - fecha_expedicion
                - tipo_factura
                - descripcion
                - lineas
                - importe_total
              properties:
                serie:
                  type: string
                  example: A
                  description: >
                    Serie de la factura. Si no se quiere incluir una serie, se
                    puede enviar una string vacía. No debe comenzar por un
                    espacio en blanco. La concatenación de los campos serie y
                    número no puede tener más de 60 caracteres.
                numero:
                  type: string
                  example: '234634'
                  description: >-
                    Número de la factura. La concatenación de los campos serie y
                    número no puede tener más de 60 caracteres.
                fecha_expedicion:
                  type: string
                  example: 25-05-2026
                  pattern: \d{2,2}-\d{2,2}-\d{4,4}
                  description: >
                    Fecha de emisión de la factura que <span style="color:
                    red">debe ser la fecha actual</span>. En caso de querer
                    emitir una factura por una operación que ocurrió en una
                    fecha pasada se debe usar el campo `fecha_operacion`.
                fecha_operacion:
                  type: string
                  pattern: \d{2,2}-\d{2,2}-\d{4,4}
                  description: >-
                    Fecha de la operación. Puede ser una fecha anterior a la
                    actual.
                tipo_factura:
                  type: string
                  example: F1
                  enum:
                    - F1
                    - F2
                    - R1
                    - R2
                    - R3
                    - R4
                    - R5
                    - F3
                  description: |
                    Los diferentes tipos de factura son:
                    <ol style="list-style: disc;">
                      <li>F1: Factura (Art. 6, 7.2 Y 7.3 del RD 1619/2012)</li>
                      <li>F2: Factura simplificada y facturas sin identificación del destinatario (Art. 6.1.D RD 1619/2012)</li>
                      <li>R1: Factura rectificativa (Art 80.1 y 80.2 y error fundado en derecho)</li>
                      <li>R2: Factura rectificativa (Art. 80.3)</li>
                      <li>R3: Factura rectificativa (Art. 80.4)</li>
                      <li>R4: Factura rectificativa (Resto)</li>
                      <li>R5: Factura rectificativa en facturas simplificadas (Art. 80.3)</li>
                      <li>F3: Factura emitida en sustitución de facturas simplificadas facturadas y declaradas</li>
                    </ol>
                descripcion:
                  type: string
                  example: Descripcion de la operacion
                  minLength: 1
                  maxLength: 500
                  description: Descripcion de la operacion.
                lineas:
                  type: array
                  minItems: 1
                  maxItems: 12
                  description: >
                    Líneas de la factura. Admite hasta un máximo de 12 líneas,
                    restricción impuesta por la API de la Agencia Tributaria.

                    Cada línea puede tener un tipo de IVA diferente, por lo
                    tanto, se espera que se agrupen los diferentes elementos de

                    una factura con el mismo tipo de IVA en una sola línea. De
                    lo contrario, sería frecuente exceder el límite de 12
                    líneas.
                  items:
                    $ref: '#/components/schemas/lineas'
                importe_total:
                  type: string
                  pattern: (\+|-)?\d{1,12}(\.\d{0,2})?
                  description: >
                    Importe total de la factura. Se validará que sea igual a la
                    suma de (`base_imponible` + `cuota_repercutida` + 

                    `cuota_recargo_equivalencia`) de todas las líneas
                    admitiéndose un margen de error de +/- 10,00€. Esta
                    validación no

                    se aplicará cuando `clave_regimen` sea 03, 05, 06, 08 o 09.
                  example: '242.00'
                nif:
                  type: string
                  example: A15022510
                  description: >
                    NIF del cliente al que se le emite la factura. Necesario
                    salvo para facturas simplificadas (F2, R5) o cuando se
                    incluya el campo `id_otro`.

                    En caso de incluir tanto `nif` como `id_otro`, se utilizará
                    `nif`.


                    &nbsp;


                    Si se incluye el campo `nif` validamos por defecto que está
                    censado en la AEAT ya que si no lo está, la AEAT rechazará
                    el envío. En caso de

                    no estar censado, se devolverá un error 400, lo que
                    significa que el registro de facturación no se ha generado y
                    no se producirá envío a la AEAT.


                    &nbsp;


                    Para personas jurídicas es suficiente con que el NIF esté
                    censado. Para personas físicas, es necesario que el NIF esté
                    censado y que el `nombre` sea

                    suficientemente parecido al nombre que aparece en el censo.


                    &nbsp;


                    Disponemos de un endpoint para validar el NIF de personas
                    fisicas y jurídicas en la API de gestión de NIFs. Se puede
                    consultar la documentación

                    <a
                    href="https://www.verifacti.com/nifs-docs#tag/NIFs/paths/~1nifs~1validar/post"
                    target="_blank">aquí</a>.
                id_otro:
                  type: object
                  description: >
                    Identificador de persona física o jurídica distinto del NIF.
                    Necesario salvo para facturas simplificadas (F2, R5) o
                    cuando

                    se incluya el campo `nif`. En caso de incluir tanto `nif`
                    como `id_otro`, se utilizará `nif`.


                    &nbsp;


                    Si es campo `codigo_pais` es igual a ES, se validará que el
                    campo `id_type` sea 03 o 07. Si el campo `id_type` es 07, se

                    validará que el campo `codigo_pais` sea ES.
                  properties:
                    codigo_pais:
                      type: string
                      description: >-
                        Código del país de la persona física o jurídica en
                        formato ISO 3166-1 alpha-2. Obligatorio salvo cuando
                        `id_type` sea 02.
                    id_type:
                      type: string
                      enum:
                        - '02'
                        - '03'
                        - '04'
                        - '05'
                        - '06'
                        - '07'
                      description: >
                        Tipo de identificador de la persona física o jurídica.
                        Los diferentes tipos de identificador son:

                        <ol style="list-style: disc;">
                          <li>02: NIF-IVA</li>
                          <li>03: Pasaporte</li>
                          <li>04: IDEnPaisResidencia</li>
                          <li>05: Certificado Residencia</li>
                          <li>06: Otro documento Probatorio</li>
                          <li>07: No Censado</li>
                        </ol>
                    id:
                      type: string
                      maxLength: 20
                      description: >
                        Identificador de la persona física o jurídica. Se
                        permite hasta un máximo de 20 caracteres.


                        &nbsp;


                        Cuando el país es intracomunitario y el `id_type` es
                        igual a `02`, es decir, corresponde a un número de IVA
                        se validará por defecto

                        que esté en el censo VIES. Si no lo está, la AEAT
                        rechazará el envío.


                        &nbsp;


                        Disponemos de un endpoint para validación de IVAs en el
                        censo VIES en la API de gestión de NIFs. Se

                        puede consultar la documentación <a
                        href="https://www.verifacti.com/nifs-docs#tag/NIFs/paths/~1nifs~1validar~1vies/post"
                        target="_blank">aquí</a>.
                nombre:
                  type: string
                  maxLength: 120
                  example: Nombre cliente
                  description: >-
                    Nombre y apellidos o razón social del cliente al que se le
                    emite la factura. Necesario salvo para facturas
                    simplificadas (F2, R5).
                validar_destinatario:
                  type: boolean
                  default: true
                  description: >
                    Si se incluye el campo `nif` validamos por defecto que está
                    censado en la AEAT ya que si no lo está, la AEAT rechazará
                    el envío. Esto requiere una

                    llamada adicional por nuestro lado. Puedes desactivar esta
                    validación en el entorno de test poniendo este campo a
                    `false`.


                    &nbsp;


                    De manera similar, si se incluye el campo `id_otro` con
                    `id_type` igual a `02` validamos por defecto que el IVA esté
                    en el censo VIES. Se puede

                    desactivar esta validación en el entorno de test poniendo
                    este campo a `false`.
                tipo_rectificativa:
                  type: string
                  enum:
                    - S
                    - I
                  description: >
                    Requerido y permitido únicamente para facturas
                    rectificativas (R1, R2, R3, R4, R5). Indica si la
                    rectificativa

                    es por sustitución (`S`) o por diferencia (`I`).
                importe_rectificativa:
                  type: object
                  description: >-
                    Requerido y permitido únicamente si `tipo_rectificativa` es
                    igual a `S`.
                  properties:
                    base_rectificada:
                      type: string
                      pattern: (\+|-)?\d{1,12}(\.\d{0,2})?
                      description: Base imponible de la rectificada.
                    cuota_rectificada:
                      type: string
                      pattern: (\+|-)?\d{1,12}(\.\d{0,2})?
                      description: Cuota repercutida de la rectificada.
                    cuota_recargo_rectificada:
                      type: string
                      pattern: (\+|-)?\d{1,12}(\.\d{0,2})?
                      description: Cuota recargo de equivalencia de la rectificada.
                facturas_rectificadas:
                  type: array
                  description: >-
