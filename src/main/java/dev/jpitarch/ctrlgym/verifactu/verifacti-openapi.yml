  description: >

    &nbsp;


    Aquí encontrarás la documentación técnica de nuestra API para enviar
    facturas a la Agencia Estatal de Administración Tributaria (AEAT) de acuerdo

    al sistema Verifactu.


    &nbsp;


    También disponemos de una API para cumplir con los requisitos de TicketBai,
    el análogo a Verifactu en el País Vasco. Se trata de una API

    separada pero con una estructura completamente análoga. La documentación se
    puede encontrar en <a href="https://www.verifacti.com/tb-docs">aquí</a>.


    &nbsp;


    Asimismo, hemos creado una tercera API para poder gestionar los diferentes
    NIFs de manera programática. Para usuarios que solo deben gestionar

    unos pocos NIFs, esto se puede hacer de manera cómoda a través de nuestra
    interfaz. Sin embargo, en ocasiones esto no es práctico y hace falta tener 

    una manera programática de dar de alta y de baja diferentes NIFs. Para ello,
    se puede utilizar nuestra API de gestión de NIFs, cuya documentación se

    puede consultar <a href="https://www.verifacti.com/nifs-docs">aquí</a>. Esta
    API está incluida en el precio y se puede usar por cualquier usuario

    con una suscripción activa.


